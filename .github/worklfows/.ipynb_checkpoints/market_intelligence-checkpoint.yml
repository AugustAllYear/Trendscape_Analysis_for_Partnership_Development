name: Market Intelligence CI/CD

on:
  schedule:
    - cron: '0 3 * * *'   # daily at 3 AM
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'requirements.txt'
      - 'dags/**'

jobs:
  test-and-train:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m spacy download en_core_web_sm
          python -m nltk.downloader stopwords punkt
      - name: Run tests
        run: pytest tests/ -v
      - name: Train model (simulated)
        run: python -c "from src.topic_model import update_topic_model; update_topic_model(data_path='./data/processed/', window_days=90)"
      - name: Log to MLflow
        run: |
          mlflow experiments create -n market_intelligence || true
          python src/log_experiment.py   # (you would need to implement this)
